<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About Us — vivahaa</title>
<meta name="description" content="vivahaa started with a simple idea: planning an Indian wedding should feel joyful, not chaotic. Learn our story, values and team.">
<link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
<script>(function(){try{var t=localStorage.getItem("vivahaa_theme");if(!t&&window.matchMedia("(prefers-color-scheme: dark)").matches){t="dark";}if(t){document.documentElement.setAttribute("data-theme",t);}var l=localStorage.getItem("vivahaa_lang");if(l==="hi"){document.documentElement.setAttribute("lang","hi");}}catch(e){}})();</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Manrope:wght@400;500;600;700;800&family=Petit+Formal+Script&family=Eczar:wght@500;600;700;800&family=Hind:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/responsive.css">
</head>
<body>

<div class="page-loader"><span class="loader loader-dark"></span></div>
<a href="#main" class="skip-link">Skip to content</a>
<header id="app-header" data-transparent="true"></header>

<main id="main">
  <section class="hero page-hero">
    <div class="hero-pattern"></div>
    <div class="hero-illustration" data-illustration="ceremony"></div>
    <div class="container hero-inner">
      <div class="breadcrumb"><a href="index.html" data-i18n="nav.home"></a><span>/</span><span data-i18n="nav.about"></span></div>
      <p class="eyebrow" style="justify-content:center;" data-i18n="about.hero.eyebrow"></p>
      <h1 data-i18n="about.hero.title"></h1>
    </div>
  </section>

  <!-- STORY -->
  <section class="section">
    <div class="container" style="max-width: 780px;">
      <div class="section-head align-left reveal" style="margin-bottom: var(--sp-5);">
        <p class="eyebrow" data-i18n="about.story.eyebrow"></p>
        <h2 data-i18n="about.story.title"></h2>
      </div>
      <p class="reveal" data-i18n="about.story.p1"></p>
      <p class="reveal" data-i18n="about.story.p2"></p>
      <p class="reveal" data-i18n="about.story.p3"></p>
    </div>
  </section>

  <!-- VALUES -->
  <section class="section section-alt">
    <div class="container">
      <div class="section-head reveal">
        <p class="eyebrow" style="justify-content:center;" data-i18n="about.values.eyebrow"></p>
        <h2 data-i18n="about.values.title"></h2>
      </div>
      <div class="grid grid-4">
        <div class="cat-card card reveal"><div class="cat-icon"><i class="fa-solid fa-om"></i></div><h4 data-i18n="about.values.v1Title"></h4><p data-i18n="about.values.v1Desc"></p></div>
        <div class="cat-card card reveal"><div class="cat-icon"><i class="fa-solid fa-scale-balanced"></i></div><h4 data-i18n="about.values.v2Title"></h4><p data-i18n="about.values.v2Desc"></p></div>
        <div class="cat-card card reveal"><div class="cat-icon"><i class="fa-solid fa-shield-heart"></i></div><h4 data-i18n="about.values.v3Title"></h4><p data-i18n="about.values.v3Desc"></p></div>
        <div class="cat-card card reveal"><div class="cat-icon"><i class="fa-solid fa-comments"></i></div><h4 data-i18n="about.values.v4Title"></h4><p data-i18n="about.values.v4Desc"></p></div>
      </div>
    </div>
  </section>

  <!-- TEAM -->
  <section class="section">
    <div class="container">
      <div class="section-head reveal">
        <p class="eyebrow" style="justify-content:center;" data-i18n="about.team.eyebrow"></p>
        <h2 data-i18n="about.team.title"></h2>
        <p class="lead" style="margin:0 auto;" data-i18n="about.team.subtitle"></p>
      </div>
      <div class="grid grid-4">
        <div class="card text-center reveal"><div class="card-body">
          <div class="avatar-badge" style="width:78px;height:78px;font-size:1.6rem;margin:0 auto var(--sp-4);">1</div>
          <h4 class="mb-0">Harshada Dhumal</h4><p class="form-hint"></p>
        </div></div>
        <div class="card text-center reveal"><div class="card-body">
          <div class="avatar-badge" style="width:78px;height:78px;font-size:1.6rem;margin:0 auto var(--sp-4);">2</div>
          <h4 class="mb-0">Lahu Rathod</h4><p class="form-hint"></p>
        </div></div>
        <div class="card text-center reveal"><div class="card-body">
          <div class="avatar-badge" style="width:78px;height:78px;font-size:1.6rem;margin:0 auto var(--sp-4);">3</div>
          <h4 class="mb-0">Nirjala Surve</h4><p class="form-hint"></p>
        </div></div>
        <div class="card text-center reveal"><div class="card-body">
          <div class="avatar-badge" style="width:78px;height:78px;font-size:1.6rem;margin:0 auto var(--sp-4);">4</div>
          <h4 class="mb-0">Tabish Qureshi</h4><p class="form-hint"></p>
        </div></div>
      </div>
    </div>
  </section>

  <!-- WHY -->
  <section class="section section-dark">
    <div class="container">
      <div class="section-head reveal">
        <p class="eyebrow" style="justify-content:center;" data-i18n="about.why.eyebrow"></p>
        <h2 data-i18n="about.why.title"></h2>
      </div>
      <div class="grid grid-3">
        <div class="testimonial-card reveal"><i class="fa-solid fa-map-location-dot" style="color:var(--color-gold-light);font-size:1.4rem;margin-bottom:var(--sp-3);"></i><p style="color:inherit;" data-i18n="about.why.w1"></p></div>
        <div class="testimonial-card reveal"><i class="fa-solid fa-chart-pie" style="color:var(--color-gold-light);font-size:1.4rem;margin-bottom:var(--sp-3);"></i><p style="color:inherit;" data-i18n="about.why.w2"></p></div>
        <div class="testimonial-card reveal"><i class="fa-solid fa-language" style="color:var(--color-gold-light);font-size:1.4rem;margin-bottom:var(--sp-3);"></i><p style="color:inherit;" data-i18n="about.why.w3"></p></div>
        <div class="testimonial-card reveal"><i class="fa-solid fa-user-tie" style="color:var(--color-gold-light);font-size:1.4rem;margin-bottom:var(--sp-3);"></i><p style="color:inherit;" data-i18n="about.why.w4"></p></div>
        <div class="testimonial-card reveal"><i class="fa-solid fa-lock" style="color:var(--color-gold-light);font-size:1.4rem;margin-bottom:var(--sp-3);"></i><p style="color:inherit;" data-i18n="about.why.w5"></p></div>
        <div class="testimonial-card reveal"><i class="fa-solid fa-headset" style="color:var(--color-gold-light);font-size:1.4rem;margin-bottom:var(--sp-3);"></i><p style="color:inherit;" data-i18n="about.why.w6"></p></div>
      </div>
    </div>
  </section>

  <section class="section-sm">
    <div class="container">
      <div class="section-cta reveal">
        <h2 data-i18n="home.cta.title"></h2>
        <p class="lead" style="margin:0 auto var(--sp-5);" data-i18n="home.cta.subtitle"></p>
        <a href="planner.html" class="btn btn-gold btn-lg" data-i18n="home.cta.btn"></a>
      </div>
    </div>
  </section>
</main>

<footer id="app-footer"></footer>

<script src="js/i18n.js"></script>
<script src="js/data.js"></script>
<script src="js/illustrations.js"></script>
<script src="js/auth.js"></script>
<script src="js/forms.js"></script>
<script src="js/main.js"></script>
<script>vivahaa.init("about");</script>
</body>
</html>
